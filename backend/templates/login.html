<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Реестр абитуриентов — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/login.css" />
</head>
<body>

<div class="bg-wrap"></div>
<div class="shapes">
  <div class="shape"></div><div class="shape"></div>
  <div class="shape"></div><div class="shape"></div>
</div>
<div class="grid-overlay"></div>

<div class="page">

  <header class="header-bar">
    <div class="logo-mark">
      <img src="/static/icon.png" alt="Логотип"
           onerror="this.style.display='none'; this.parentElement.innerHTML='А';" />
    </div>
    <div class="logo-text">Абитуриент <span>/ система учёта</span></div>
  </header>

  <main class="center">
    <div class="card login-card">

      <div class="card-header-custom">
        <h1>ВХОД В СИСТЕМУ</h1>
        <p>Введите ваши учётные данные для продолжения</p>
      </div>

      <div class="card-body" style="padding: 28px 36px;">

        <div class="error-banner" id="errorBanner" role="alert">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="errorText">Неверный логин или пароль</span>
        </div>

        <form id="loginForm" novalidate>

          <div class="mb-3">
            <label for="username" class="field-label">Логин</label>
            <div class="input-group">
              <span class="input-group-text">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
              <input type="text" class="form-control" id="username"
                     autocomplete="username" placeholder="Введите логин" required />
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="field-label">Пароль</label>
            <div class="input-group">
              <span class="input-group-text">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input type="password" class="form-control" id="password"
                     autocomplete="current-password" placeholder="Введите пароль" required />
              <button type="button" class="btn-eye" id="eyeToggle" aria-label="Показать пароль">
                <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-login w-100" id="submitBtn">
            <span class="btn-text">Войти</span>
            <span class="spinner-border text-light" role="status" aria-hidden="true"></span>
          </button>

        </form>
      </div>

      <div class="card-footer-note">
        Если у вас нет доступа, обратитесь к администратору системы
      </div>

    </div>
  </main>

  <footer class="bottom-bar">
    Реестр абитуриентов &nbsp;·&nbsp; 2026
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/login.js"></script>
</body>
</html>

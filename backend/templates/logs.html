<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Журнал системы — Абитуриент</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700;800&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/dashboard.css?v=20260310" />
  <link rel="stylesheet" href="/static/css/logs.css?v=20260316" />
  <style>
    html, body { height: auto !important; overflow-y: auto !important; }
    .logs-content { margin-top: calc(var(--header-h) + var(--toolbar-h)); padding: 20px 24px 60px; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-left">
    <div class="logo-mark"><img src="/static/icon.png" alt="А" id="logoImg" /></div>
    <span class="header-title">АБИТУРИЕНТ</span>
    <span style="color:rgba(255,255,255,.35);margin:0 8px">/</span>
    <span style="color:rgba(255,255,255,.75);font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase">Журнал системы</span>
  </div>
  <div class="header-right">
    <span class="user-badge" id="userBadge">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span id="userName">...</span>
    </span>
    <span class="role-pill" id="rolePill">admin</span>
    <button class="btn-logout" id="logoutBtn" title="Выйти">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-left">
    <a href="/dashboard" class="tb-btn" style="text-decoration:none;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      К реестру
    </a>
    <div class="tb-divider"></div>
    <button class="tb-btn tb-btn-primary" id="btnRefreshLogs">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Обновить
    </button>
  </div>
  <div class="toolbar-right">
    <span class="records-count" id="logsCount"></span>
  </div>
</div>

<div class="logs-content">
  <div class="rp-tabs-wrap">
    <div class="rp-tabs">
      <button class="rp-tab active" data-panel="panelFileLogs">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Системные логи
      </button>
      <button class="rp-tab" data-panel="panelAuditLogs">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Действия пользователей
      </button>
    </div>

    <div class="rp-panel active" id="panelFileLogs">
      <div class="rp-panel-toolbar">
        <div class="rp-field-group">
          <label class="rp-field-label">Уровень</label>
          <select id="filterLevel" class="rp-input" style="width:130px">
            <option value="">Все</option>
            <option value="INFO">INFO</option>
            <option value="WARNING">WARNING</option>
            <option value="ERROR">ERROR</option>
            <option value="CRITICAL">CRITICAL</option>
          </select>
        </div>
        <div class="rp-field-group">
          <label class="rp-field-label">Поиск</label>
          <input type="text" id="filterSearch" class="rp-input" placeholder="текст в логе..." style="width:220px" />
        </div>
        <div class="rp-field-group">
          <label class="rp-field-label">Строк</label>
          <select id="filterLines" class="rp-input" style="width:90px">
            <option value="100">100</option>
            <option value="200" selected>200</option>
            <option value="500">500</option>
            <option value="1000">1000</option>
          </select>
        </div>
        <button class="tb-btn tb-btn-primary" id="btnFilterLogs">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Применить
        </button>
        <button class="tb-btn" id="btnClearFilter">Сбросить</button>
      </div>
      <div class="logs-level-bar" id="levelBar"></div>
      <div id="fileLogsArea"><div class="rp-loading"><div class="rp-spinner"></div>Загрузка...</div></div>
    </div>

    <div class="rp-panel" id="panelAuditLogs">
      <div class="rp-panel-toolbar">
        <div class="rp-field-group">
          <label class="rp-field-label">Действие</label>
          <select id="auditAction" class="rp-input" style="width:140px">
            <option value="">Все</option>
            <option value="create">Создание</option>
            <option value="update">Изменение</option>
            <option value="delete">Удаление</option>
          </select>
        </div>
        <div class="rp-field-group">
          <label class="rp-field-label">Пользователь</label>
          <input type="text" id="auditUser" class="rp-input" placeholder="логин..." style="width:150px" />
        </div>
        <button class="tb-btn tb-btn-primary" id="btnLoadAudit">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Загрузить
        </button>
      </div>
      <div class="rp-summary" id="auditSummary"></div>
      <div id="auditLogsArea"><div class="rp-loading"><div class="rp-spinner"></div>Загрузка...</div></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/storage.js?v=20260310c"></script>
<script src="/static/js/logs.js?v=20260316"></script>
</body>
</html>
